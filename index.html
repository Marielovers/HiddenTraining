<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>티그 리츠의 비행수련</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="title-screen" class="overlay-screen">
            <div class="main-title">티그 리츠의<br>비행수련</div>
            <p style="color:#d2b48c; margin-top:-20px; margin-bottom:30px; font-size:14px;">터치 & 드래그로 이동 / 더블 탭으로 폭탄 사용</p>
            <button class="start-btn" onclick="goToLoadout()">게임 시작</button>
            <button class="start-btn" style="margin-top: 15px;" onclick="openDict()">상세 설명</button>
        </div>

        <div id="loadout-screen" class="overlay-screen">
            <h2 style="color:white; margin-bottom:20px;">기체 조립</h2>
            
            <div class="selection-slots">
                <div id="slot-left" class="slot active" onclick="setSelectionTarget('left')">
                    <div class="slot-label">왼쪽 파츠</div>
                    <div id="preview-left-icon" class="slot-icon"></div>
                    <div id="preview-left-name" class="slot-name">선택</div>
                </div>
        
                <div id="slot-right" class="slot" onclick="setSelectionTarget('right')">
                    <div class="slot-label">오른쪽 파츠</div>
                    <div id="preview-right-icon" class="slot-icon"></div>
                    <div id="preview-right-name" class="slot-name">대기 중...</div>
                </div>
            </div>

            <h3 id="selection-guide" style="color:#00f0ff; margin: 10px 0;">◀ 왼쪽 파츠 선택</h3>

            <div class="loadout-container">
                <div class="part-grid" id="unified-part-grid"></div>
            </div>

            <button id="mission-start-btn" class="start-btn" onclick="startGame()" disabled>출격</button>
        </div>

        <div id="ui">
            <div style="position: absolute; top: 10px; left: 10px;">
                <div id="scoreBoard" style="font-size: 2.5vmin; font-weight: bold; margin: 0; color: #333; text-shadow: 1px 1px 2px white;">점수: 0</div>
            </div>
            
            <div style="position: absolute; bottom: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; text-align: left;">
                <div class="bar-container" style="width: 90px; margin: 0;">
                    <div id="hp-bar"></div>
                    <span class="bar-text" id="hp-text">체력: 100/100</span>
                </div>
                
                <div class="bar-container" style="width: 90px; margin: 0;">
                    <div id="xp-bar"></div>
                    <span class="bar-text" id="xp-text">레벨 1 (0/50)</span>
                </div>
            </div>
            
            <div id="boss-ui" style="display: none; position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center;">
                <div style="color: red; font-weight: bold; font-size: 2.5vmin; text-shadow: 1px 1px 2px black; margin-bottom: 5px;" id="boss-hp-text">경고: 보스 출현!</div>
                <div style="width: 100%; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid red; border-radius: 10px; overflow: hidden;">
                    <div id="boss-hp-bar" style="width: 100%; height: 100%; background: linear-gradient(90deg, darkred, red); transition: width 0.1s;"></div>
                </div>
            </div>

            <div id="bomb-container" style="position: absolute; bottom: 10px; right: 10px; display: flex; flex-direction: column-reverse; gap: 5px; align-items: flex-end;">
            </div>
        </div>

        <div id="upgrade-modal" class="overlay-screen">
            <div id="select-ui" style="display:flex; flex-direction:column; align-items:center;">
                <div class="modal-title">레벨 업! (터치하여 선택)</div>
                <div class="card-container" id="card-list"></div>
                <div id="fixed-upgrade-container">
                    <button class="fixed-btn" id="btn-heal" onclick="selectFixedUpgrade('heal')">❤️ 체력 회복</button>
                    <button class="fixed-btn" id="btn-bomb" onclick="selectFixedUpgrade('bomb')">💣 마리 획득</button>
                </div>
                <div id="extra-upgrade-container" style="display: flex; gap: 3%; border-top: 2px dashed #5c3a21; padding-top: 2vh; margin-top: 2vh; width: 90%; justify-content: center;">
                    <button class="fixed-btn" id="btn-reroll" onclick="rerollUpgrade()" style="background:#4a3b2c;">🔄 리롤 (3/3)</button>
                    <button class="fixed-btn" id="btn-skip" onclick="skipUpgrade()" style="background:#5c2121; border-color:#ff4444; font-size: 2.5vmin;">❌ 포기 (경험치 -50%)</button>
                </div>
            </div>
            <div id="replace-ui">
                <div class="modal-title">교체할 위치 선택</div>
                <div style="font-size:14px; color:#aaa; margin-bottom:20px;">*교체 시 기존 파츠 레벨 유지</div>
                <div style="display:flex; gap:20px;">
                    <button class="replace-btn" id="btn-replace-left">왼쪽</button>
                    <button class="replace-btn" id="btn-replace-right">오른쪽</button>
                </div>
                <button class="replace-btn" id="btn-replace-cancel">선택 취소</button>
            </div>
        </div>

        <div id="dict-screen" class="overlay-screen" style="display:none; justify-content:flex-start; padding: 5vh 5vw; background: rgba(26, 42, 24, 0.95);">
            <div style="width:100%; max-width:500px; display:flex; justify-content:space-between; align-items:center; margin-bottom: 2vh;">
                <h2 style="color:#ffd700; text-shadow: 2px 2px #5c3a21; margin:0;">상세설명</h2>
            </div>
            <div id="dict-list" style="width: 100%; max-width: 500px; display:flex; flex-direction:column; max-height: 70vh; overflow-y:auto; gap: 10px; padding-right: 5px;">
            </div>
            <button class="start-btn" style="margin-top: 2vh; padding: 1.5vh 5vw; font-size: 3vmin;" onclick="closeDict()">닫기</button>
        </div>
    
        <canvas id="gameCanvas" width="450" height="700"></canvas>
    </div>

    <script src="js/data.js"></script>
    <script src="js/game.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5lHhwpQgyPqzLRkUBa0ROkNxKVLAG-Y8",
            authDomain: "exit-bol.firebaseapp.com",
            projectId: "exit-bol",
            storageBucket: "exit-bol.firebasestorage.app",
            messagingSenderId: "259374629685",
            appId: "1:259374629685:web:56bdb417ef6269c1b5827c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.uploadScore = async function(name, scoreVal, stageVal, leftPartId, rightPartId) {
            try {
                await addDoc(collection(db, "dualcore_ranking"), {
                    name: name,
                    score: Number(scoreVal),
                    stage: Number(stageVal),
                    left_part: leftPartId || null,
                    right_part: rightPartId || null,
                    date: new Date().toISOString()
                });
            } catch (e) {
            }
        };

        window.showRankingBoard = async function() {
            let board = document.getElementById('ranking-overlay');
            if (!board) {
                board = document.createElement('div');
                board.id = 'ranking-overlay';
                board.className = 'overlay-screen';
                board.style.display = 'flex';
                document.getElementById('game-container').appendChild(board);
            }
            board.style.display = 'flex';
            board.innerHTML = '<h2 style="color:#ffd700; margin-bottom:20px; text-shadow:2px 2px #5c3a21;">글로벌 랭킹</h2><div style="color:#d2b48c; margin-bottom:20px;">데이터를 불러오는 중...</div>';
            
            try {
                const q = query(collection(db, "dualcore_ranking"), orderBy("score", "desc"), limit(10));
                const querySnapshot = await getDocs(q);
                
                let list = [];
                querySnapshot.forEach((doc) => {
                    list.push(doc.data());
                });
                
                let html = '<h2 style="color:#ffd700; margin-bottom:20px; text-shadow:2px 2px #5c3a21;">글로벌 랭킹</h2>';
                html += '<div style="width:100%; max-height:40vh; overflow-y:auto; margin-bottom:30px;">';
                html += '<table style="width:100%; border-collapse:collapse; text-align:center; font-size:16px; color:white;">';
                html += '<tr style="border-bottom:2px solid #d2b48c; color:#ffd700;"><th>순위</th><th>이름</th><th>조합</th><th>점수</th><th>스테이지</th></tr>';
                
                if (list.length === 0) {
                    html += '<tr><td colspan="5" style="padding:15px; color:#d2b48c;">등록된 랭킹이 없습니다.</td></tr>';
                } else {
                    list.forEach((item, idx) => {
                        let leftName = (item.left_part && typeof PARTS_INFO !== 'undefined' && PARTS_INFO[item.left_part]) ? PARTS_INFO[item.left_part].name : '없음';
                        let rightName = (item.right_part && typeof PARTS_INFO !== 'undefined' && PARTS_INFO[item.right_part]) ? PARTS_INFO[item.right_part].name : '없음';
                        
                        let comboText = (leftName === '없음' && rightName === '없음') ? '없음' : `${leftName} & ${rightName}`;

                        html += `<tr style="border-bottom:1px solid #3e2723;">
                                    <td style="padding:10px;">${idx+1}</td>
                                    <td>${item.name || '무명'}</td>
                                    <td style="font-size:13px; color:#adff2f;">${comboText}</td>
                                    <td style="color:#ffd700;">${item.score}</td>
                                    <td>${item.stage}</td>
                                 </tr>`;
                    });
                }
                html += '</table></div>';
                
                html += '<button class="start-btn" onclick="document.getElementById(\'ranking-overlay\').style.display=\'none\'">닫기</button>';
                board.innerHTML = html;
                
                let restartBtn = document.createElement('button');
                restartBtn.className = 'start-btn';
                restartBtn.style.marginTop = '15px';
                restartBtn.innerText = '다시하기';
                restartBtn.onclick = () => {
                    document.getElementById('ranking-overlay').style.display = 'none';
                    if (window.resetToTitle) window.resetToTitle();
                };
                board.appendChild(restartBtn);
                
            } catch (e) {
                board.innerHTML = '<h2 style="color:#ffd700; margin-bottom:20px; text-shadow:2px 2px #5c3a21;">글로벌 랭킹</h2><div style="color:#dc143c; margin-bottom:20px;">데이터 로드 실패</div><button class="start-btn" onclick="document.getElementById(\'ranking-overlay\').style.display=\'none\'">닫기</button>';
                
                let restartBtn = document.createElement('button');
                restartBtn.className = 'start-btn';
                restartBtn.style.marginTop = '15px';
                restartBtn.innerText = '다시하기';
                restartBtn.onclick = () => {
                    document.getElementById('ranking-overlay').style.display = 'none';
                    if (window.resetToTitle) window.resetToTitle();
                };
                board.appendChild(restartBtn);
            }
        };
    </script>
</body>
</html>
